about_content: |
  Engineering leader with deep experience building and operating reliable cloud SaaS platforms at scale. I work across infrastructure, platform engineering, observability, and security to improve resilience, accelerate delivery, and raise the technical bar for teams.

  My background spans multi-region AWS environments, Kubernetes platforms, infrastructure modernization, and FedRAMP delivery. I am most effective where hands-on technical execution and clear engineering leadership are both required.

