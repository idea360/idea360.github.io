about_content: |
  Engineering leader with deep experience building and operating cloud platforms that are reliable, scalable, and secure. I lead across infrastructure, platform engineering, observability, and operations to improve resilience, accelerate delivery, and help teams execute at a higher level.

  My background spans AWS, Kubernetes, infrastructure modernization, and regulated environments. I am most effective in roles that require strong technical judgment, calm operational leadership, and the ability to turn platform investments into measurable engineering outcomes.

